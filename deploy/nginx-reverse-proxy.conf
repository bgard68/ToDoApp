# nginx site config: serves the built SPA and reverse-proxies /api to the Kestrel process.
# Put the built frontend (frontend/dist) at /var/www/todoapp-web and the API on 127.0.0.1:5080.
# Add TLS with: sudo certbot --nginx -d todo.example.com
server {
    listen 80;
    server_name todo.example.com;

    root /var/www/todoapp-web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
