name: Build and Deploy taskboard-06-api
 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
 
# Required for OIDC (federated) login to Azure — no stored password/publish-profile.
permissions:
  id-token: write
  contents: read
 
jobs:
  build-and-deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: "Debug: repo files & lockfiles"
        run: |
          echo "PWD: $(pwd)"
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          echo "=== Git status ==="
          git status --porcelain
          echo "HEAD branch and SHA:"
          git rev-parse --abbrev-ref HEAD
          git rev-parse HEAD
          echo "=== List repo root ==="
          ls -la
          echo "=== Find all packages.lock.json files ==="
          find . -type f -name 'packages.lock.json' -print -exec ls -l {} \; || true
          echo "=== Tracked files with packages.lock.json in name ==="
          git ls-files | grep -i 'packages.lock.json' || true
 
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          cache: true
          # This wildcard tells GitHub to look inside Application, WebAPI, etc.
          cache-dependency-path: '**/packages.lock.json'
 
      - name: Restore dependencies
        run: dotnet restore TodoApp.sln --use-lock-file
 
      - name: Build solution
        run: dotnet build TodoApp.sln --configuration Release --no-restore
 
      - name: Run unit tests
        run: dotnet test tests/TodoApp.UnitTests/TodoApp.UnitTests.csproj --configuration Release --no-build
 
      - name: Publish API
        run: dotnet publish src/TodoApp.WebApi/TodoApp.WebApi.csproj --configuration Release --no-build --output ./publish

      - name: Verify publish output
        run: |
          if [ ! -f ./publish/TodoApp.WebApi.dll ]; then
            echo "::error title=Publish failed::No TodoApp.WebApi.dll in ./publish - refusing to continue."
            exit 1
          fi
          echo "Publish OK: $(ls -1 ./publish | wc -l) files."
 
      # Keep the build output as a downloadable artifact (handy for PR builds and manual deploys).
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ./publish
 
      # ---- Deploy (main branch only; PRs build + test but never deploy) ----
 
      - name: Azure login
        if: github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_566B4FFECC144FF99662F3E334946913 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_666F8329ACAC4EF9A4E3DFE024EB99CA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0056D27AD4F64315858EF3757BCD85C7 }}
          
      - name: Deploy to Azure Web App
        if: github.ref == 'refs/heads/main'
        uses: azure/webapps-deploy@v3
        with:
          app-name: taskboard-06-api
          package: ./publish
