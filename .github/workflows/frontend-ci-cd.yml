name: Build and Deploy Frontend (Static Web Apps)

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened, closed ]
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    # Run on pushes and on open/updated PRs (skip the "closed" event — that's handled below).
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        # Vite env vars are BUILD-TIME — they must be present here, not in the SWA runtime config.
        # Stored as GitHub repository Variables (Settings > Secrets and variables > Actions > Variables).
        # VITE_API_URL must include the https:// scheme (the API's URL, the one that shows Swagger).
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_FIELD_054249810 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # for PR comments / preview environments
          action: "upload"
          app_location: "./frontend"   # front-end source
          api_location: ""             # no managed API in the SWA (the API is a separate App Service)
          output_location: "dist"      # Vite build output

  close-pull-request:
    # When a PR is closed, tear down its preview environment.
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    name: Close Pull Request
    runs-on: ubuntu-latest
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_FIELD_054249810 }}
          action: "close"
